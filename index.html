<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
button{padding:10px;margin:5px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer}
input,select,textarea{padding:8px;margin:5px;width:100%;max-width:300px}
.card{background:#fff;padding:10px;border-radius:8px;margin:10px 0}
img{max-width:100%;border-radius:6px}
.hidden{display:none}
.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.qty{width:60px}
.pasteBox{border:2px dashed #999;padding:15px;margin:10px 0;text-align:center;background:#fafafa}
.badge{background:red;color:#fff;border-radius:50%;padding:2px 6px;font-size:12px;margin-left:4px}
</style>
</head>

<body>

<header>
<h2 id="storeName">Pétrea Shop</h2>
<p id="storeDesc">Calças, shorts, camisas, blusas e mais</p>
</header>

<div class="container">

<div class="topbar">
<button onclick="showHome()">🏠 Início</button>
<button onclick="showCart()">🛒 Carrinho <span id="cartCount" class="badge">0</span></button>
<button onclick="showLogin()">👤 Conta</button>
<button id="adminBtn" class="hidden" onclick="showAdmin()">⚙️ Admin</button>
</div>

<div id="home"></div>
<div id="productView" class="hidden"></div>
<div id="cart" class="hidden"></div>
<div id="login" class="hidden"></div>
<div id="admin" class="hidden"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_MSG_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[];
let user=JSON.parse(localStorage.getItem("user")||"null");
let currentImage="";
let editId=null;

const ADMIN_USER="admin";
const ADMIN_PASS="Petrea2024";

function hideAll(){
home.classList.add("hidden");
productView.classList.add("hidden");
cart.classList.add("hidden");
login.classList.add("hidden");
admin.classList.add("hidden");
}
window.showHome=function(){ hideAll(); home.classList.remove("hidden"); renderProducts(); }
window.showCart=function(){ hideAll(); cart.classList.remove("hidden"); renderCart(); }
window.showLogin=function(){ hideAll(); login.classList.remove("hidden"); }
window.showAdmin=function(){ if(!isAdmin()) return alert("Acesso apenas admin"); hideAll(); admin.classList.remove("hidden"); renderAdmin(); }

function isAdmin(){ return user && user.admin===true }
function updateAdminBtn(){ adminBtn.classList.toggle("hidden",!isAdmin()) }

// PRODUCTS
async function loadProducts(){
const snap=await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=> products.push({id:d.id,...d.data()}));
renderProducts();
}

function renderProducts(){
home.innerHTML="";
products.forEach((p,i)=>{
home.innerHTML+=`<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="openProduct(${i})">Ver produto</button>
</div>`;
});
}

window.openProduct=function(i){
const p=products[i];
productView.innerHTML=`<button onclick="showHome()">⬅ Voltar</button>
<div class="card">
<img src="${p.img}">
<h2>${p.name}</h2>
<p>${p.desc}</p>
<p>R$ ${p.price}</p>
<input type="number" id="qty" value="1" min="1">
<button onclick="addCart(${i})">Adicionar ao carrinho</button>
</div>`;
hideAll(); productView.classList.remove("hidden");
}

// CART
function getCart(){ if(!user) return []; return JSON.parse(localStorage.getItem("cart_"+user.name)||"[]") }
function saveCart(c){ if(!user) return; localStorage.setItem("cart_"+user.name,JSON.stringify(c)); updateCartCount(); }

function updateCartCount(){
const c=getCart();
const total=c.reduce((s,i)=>s+i.qty,0);
cartCount.textContent=total;
}

window.addCart=function(i){
if(!user) return alert("Faça login");
let c=getCart();
const q=document.getElementById("qty");
c.push({name:products[i].name,price:products[i].price,qty:Number(q.value||1)});
saveCart(c);
alert("Adicionado");
}

function renderCart(){
let c=getCart();
cart.innerHTML=`<button onclick="showHome()">⬅ Voltar</button>`;
let total=0;

c.forEach((item,i)=>{
total+=item.price*item.qty;
cart.innerHTML+=`<div class="card">
<b>${item.name}</b><br>
Qtd: <input class="qty" type="number" value="${item.qty}" onchange="changeQty(${i},this.value)">
<br>Total: R$ ${item.price*item.qty}
<br><button onclick="removeItem(${i})">Remover</button>
</div>`;
});

cart.innerHTML+=`<h3>Total: R$ ${total}</h3>
<button onclick="checkout()">Finalizar no WhatsApp</button>`;
}

window.changeQty=function(i,v){ let c=getCart(); c[i].qty=Number(v); saveCart(c); renderCart(); }
window.removeItem=function(i){ let c=getCart(); c.splice(i,1); saveCart(c); renderCart(); }

window.checkout=function(){
let c=getCart();
if(!c.length) return alert("Carrinho vazio");
let msg="Pedido:%0A";
c.forEach(i=> msg+=`${i.name} x${i.qty} - R$${i.price*i.qty}%0A`);
window.open(`https://wa.me/5534984449588?text=${msg}`);
}

// LOGIN
login.innerHTML=`<h3>Login</h3>
<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="doLogin()">Entrar</button>`;

window.doLogin=function(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){ user={admin:true,name:"admin"}; }
else{ user={admin:false,name:u.value}; }
localStorage.setItem("user",JSON.stringify(user));
updateAdminBtn(); updateCartCount(); showHome();
}

// ADMIN
function renderAdmin(){
admin.innerHTML=`<button onclick="showHome()">⬅ Voltar</button>
<h3>Painel Admin Avançado</h3>

<input id="pn" placeholder="Nome">
<input id="pp" placeholder="Preço">
<input id="pd" placeholder="Descrição">
<input id="pc" placeholder="Cores">

<div class="pasteBox" contenteditable="true" id="pasteArea">📋 Cole a imagem aqui</div>
<img id="preview" style="max-width:120px;display:none">

<button id="btnSave">Salvar Produto</button>
<hr>
<div id="adminProducts"></div>`;

setTimeout(()=>{
const box=document.getElementById("pasteArea");
box.onpaste=e=>{
for(let item of e.clipboardData.items){
if(item.type.includes("image")){
const reader=new FileReader();
reader.onload=ev=>{ currentImage=ev.target.result; preview.src=currentImage; preview.style.display="block"; };
reader.readAsDataURL(item.getAsFile());
}
}
};

document.getElementById("btnSave").onclick=saveProduct;
},200);

renderAdminProducts();
}

async function saveProduct(){
if(!isAdmin()) return alert("Somente admin");

const data={
name:pn.value,
price:Number(pp.value),
 desc:pd.value,
colors:pc.value.split(","),
img:currentImage
};

if(editId){
await updateDoc(doc(db,"products",editId),data);
editId=null;
}else{
await addDoc(collection(db,"products"),data);
}

currentImage="";
loadProducts();
renderAdmin();
}

async function renderAdminProducts(){
const snap=await getDocs(collection(db,"products"));
adminProducts.innerHTML="";

snap.forEach(d=>{
// 🔒 BOTÕES SÓ PARA ADMIN
if(isAdmin()){
adminProducts.innerHTML+=`<div class="card">
<b>${d.data().name}</b>
<br><button onclick="editProduct('${d.id}')">Editar</button>
<button onclick="deleteProduct('${d.id}')">Excluir</button>
</div>`;
}else{
adminProducts.innerHTML+=`<div class="card"><b>${d.data().name}</b></div>`;
}
});
}

window.editProduct=function(id){
if(!isAdmin()) return alert("Somente admin");
const p=products.find(x=>x.id===id);
pn.value=p.name; pp.value=p.price; pd.value=p.desc; pc.value=(p.colors||[]).join(",");
currentImage=p.img; preview.src=p.img; preview.style.display="block";
editId=id;
window.scrollTo(0,0);
}

window.deleteProduct=async function(id){
// 🔒 PROTEÇÃO REAL
if(!isAdmin()) return alert("Somente admin pode excluir");
if(!confirm("Excluir produto?")) return;
await deleteDoc(doc(db,"products",id));
loadProducts(); renderAdmin();
}

// INIT
updateAdminBtn();
loadProducts();
updateCartCount();
showHome();

</script>
</body>
</html>
