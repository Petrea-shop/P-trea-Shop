<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ffd600;padding:15px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:bold}
button{cursor:pointer;border:none;border-radius:5px;padding:6px 10px}
.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.produto{background:#fff;padding:10px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1);text-align:center}
.produto img{width:100%;height:160px;object-fit:cover;border-radius:6px}
.preco{color:#009688;font-weight:bold;margin:5px 0}
#adminPanel,#carrinhoBox,#loginBox{display:none;position:fixed;top:70px;right:20px;background:#fff;padding:15px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);width:260px}
input{margin:5px 0;padding:6px;width:100%}
</style>
</head>

<body>

<header>
<div class="logo">Pétrea Shop</div>
<div>
<button onclick="abrirLogin()">Admin</button>
<button onclick="toggleCarrinho()">🛒 (<span id="qtd">0</span>)</button>
</div>
</header>

<div class="container" id="listaProdutos"></div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login Admin</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Novo Produto</h3>
<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="URL da imagem">
<button onclick="addProduto()">Salvar</button>
</div>

<!-- CARRINHO -->
<div id="carrinhoBox">
<h3>Carrinho</h3>
<div id="itens"></div>
<button onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let carrinho = [];

function render(){
let lista=document.getElementById("listaProdutos");
lista.innerHTML="";
produtos.forEach((p,i)=>{
lista.innerHTML+=`
<div class="produto">
<img src="${p.img}">
<h4>${p.nome}</h4>
<div class="preco">R$ ${p.preco}</div>
<button onclick="addCarrinho(${i})">Adicionar</button>
</div>`;
});
}

function addProduto(){
let p={
nome:document.getElementById("nome").value,
preco:document.getElementById("preco").value,
img:document.getElementById("img").value
};
produtos.push(p);
localStorage.setItem("produtos",JSON.stringify(produtos));
render();
}

function addCarrinho(i){
carrinho.push(produtos[i]);
document.getElementById("qtd").innerText=carrinho.length;
}

function toggleCarrinho(){
let box=document.getElementById("carrinhoBox");
box.style.display=box.style.display=="block"?"none":"block";
let itens=document.getElementById("itens");
itens.innerHTML="";
carrinho.forEach(p=>{
itens.innerHTML+=<div>${p.nome} - R$ ${p.preco}</div>;
});
}

function finalizar(){
let msg="Pedido:%0A";
carrinho.forEach(p=>{msg+=${p.nome} - R$ ${p.preco}%0A});
window.open(https://wa.me/5534984449588?text=${msg});
}

function abrirLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){
let u=document.getElementById("user").value;
let s=document.getElementById("pass").value;

if(u==="admin" && s==="Petrea2024"){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
}else{
alert("Senha incorreta");
}
}

render();
</script>

</body>
</html>
