<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
button{padding:10px;margin:5px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer}
input,select,textarea{padding:8px;margin:5px;width:100%;max-width:300px}
.card{background:#fff;padding:10px;border-radius:8px;margin:10px 0}
img{max-width:100%;border-radius:6px}
.hidden{display:none}
.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.qty{width:60px}
.pasteBox{border:2px dashed #999;padding:15px;margin:10px 0;text-align:center;background:#fafafa}
.badge{background:red;color:#fff;border-radius:50%;padding:2px 6px;font-size:12px;margin-left:4px}
</style>
</head>

<body>

<header>
<h2 id="storeName">Pétrea Shop</h2>
<p id="storeDesc">Calças, shorts, camisas, blusas e mais</p>
</header>

<div class="container">
<div class="topbar">
<button onclick="showHome()">🏠 Início</button>
<button onclick="showCart()">🛒 Carrinho <span id="cartCount" class="badge">0</span></button>
<button onclick="showLogin()">👤 Conta</button>
<button id="adminBtn" class="hidden" onclick="showAdmin()">⚙️ Admin</button>
</div>

<div id="home"></div>
<div id="productView" class="hidden"></div>
<div id="cartPage" class="hidden"></div>
<div id="login"></div>
<div id="admin" class="hidden"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 COLOQUE SUAS CHAVES AQUI */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_MSG_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[];
let user=JSON.parse(localStorage.getItem("user")||"null");
let editId=null;
let currentImage="";

const ADMIN_USER="admin";
const ADMIN_PASS="Petrea2024";

const home=document.getElementById("home");
const productView=document.getElementById("productView");
const cartPage=document.getElementById("cartPage");
const login=document.getElementById("login");
const admin=document.getElementById("admin");
const adminBtn=document.getElementById("adminBtn");
const cartCount=document.getElementById("cartCount");

/* ---------------- PERMISSÃO ---------------- */
function isAdmin(){ return user && user.admin===true }
function updateAdminBtn(){ adminBtn.classList.toggle("hidden",!isAdmin()) }

/* ---------------- NAV ---------------- */
function hideAll(){
home.classList.add("hidden");
productView.classList.add("hidden");
cartPage.classList.add("hidden");
login.classList.add("hidden");
admin.classList.add("hidden");
}

window.showHome=()=>{ hideAll(); home.classList.remove("hidden"); renderProducts(); }
window.showCart=()=>{ hideAll(); cartPage.classList.remove("hidden"); renderCart(); }
window.showLogin=()=>{ hideAll(); login.classList.remove("hidden"); }
window.showAdmin=()=>{ if(!isAdmin()) return alert("Acesso apenas admin"); hideAll(); admin.classList.remove("hidden"); renderAdmin(); }

/* ---------------- FIREBASE ---------------- */
async function loadProducts(){
const snap=await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
renderProducts();
}

/* ---------------- PRODUTOS ---------------- */
function renderProducts(){
home.innerHTML="";
products.forEach((p,i)=>{
home.innerHTML+=`
<div class="card">
<img src="${p.img||''}">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="openProduct(${i})">Ver produto</button>
</div>`;
});
}

window.openProduct=function(i){
const p=products[i];
productView.innerHTML=`
<button onclick="showHome()">⬅ Voltar</button>
<div class="card">
<img src="${p.img||''}">
<h2>${p.name}</h2>
<p>${p.desc||''}</p>
<p>R$ ${p.price}</p>
<input type="number" id="qty" value="1" min="1">
<button onclick="addCart(${i})">Adicionar ao carrinho</button>
</div>`;
hideAll(); productView.classList.remove("hidden");
}

/* ---------------- CARRINHO ---------------- */
function getCart(){ if(!user) return []; return JSON.parse(localStorage.getItem("cart_"+user.name)||"[]") }
function saveCart(c){ if(!user) return; localStorage.setItem("cart_"+user.name,JSON.stringify(c)); updateCartCount(); }

function updateCartCount(){
const c=getCart();
cartCount.textContent=c.reduce((s,i)=>s+i.qty,0);
}

window.addCart=function(i){
if(!user) return alert("Faça login");
let c=getCart();
const qty=document.getElementById("qty");
c.push({name:products[i].name,price:products[i].price,qty:Number(qty.value)});
saveCart(c);
alert("Adicionado");
}

function renderCart(){
let c=getCart();
cartPage.innerHTML=`<button onclick="showHome()">⬅ Voltar</button>`;
if(!c.length){ cartPage.innerHTML+="<p>Carrinho vazio</p>"; return }

let total=0;
c.forEach((item,i)=>{
total+=item.price*item.qty;
cartPage.innerHTML+=`
<div class="card">
<b>${item.name}</b>
<br>Qtd: <input class="qty" type="number" value="${item.qty}" onchange="changeQty(${i},this.value)">
<br>Total: R$ ${item.price*item.qty}
<br><button onclick="removeItem(${i})">Remover</button>
</div>`;
});

cartPage.innerHTML+=`
<h3>Total: R$ ${total}</h3>
<button onclick="clearCart()">Limpar Carrinho</button>
<button onclick="checkout()">Finalizar no WhatsApp</button>`;
}

window.changeQty=(i,v)=>{ let c=getCart(); c[i].qty=Number(v); saveCart(c); renderCart(); }
window.removeItem=(i)=>{ let c=getCart(); c.splice(i,1); saveCart(c); renderCart(); }
window.clearCart=()=>{ saveCart([]); renderCart(); }

window.checkout=()=>{
let c=getCart();
if(!c.length) return alert("Carrinho vazio");
let msg="Pedido:%0A";
c.forEach(i=> msg+=`${i.name} x${i.qty} - R$${i.price*i.qty}%0A`);
window.open(`https://wa.me/5534984449588?text=${msg}`);
}

/* ---------------- LOGIN ---------------- */
login.innerHTML=`
<h3>Login</h3>
<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="doLogin()">Entrar</button>`;

window.doLogin=function(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){ user={admin:true,name:"admin"}; }
else{ user={admin:false,name:u.value}; }
localStorage.setItem("user",JSON.stringify(user));
updateAdminBtn(); updateCartCount(); showHome();
}

/* ---------------- ADMIN ---------------- */
function renderAdmin(){
admin.innerHTML=`
<button onclick="showHome()">⬅ Voltar</button>
<h3>Painel Admin</h3>
<input id="pn" placeholder="Nome">
<input id="pp" placeholder="Preço">
<input id="pd" placeholder="Descrição">
<input id="pc" placeholder="Cores">
<input id="pimg" placeholder="URL da imagem">
<button onclick="saveProduct()">Salvar Produto</button>
<hr>
<div id="adminProducts"></div>`;
renderAdminProducts();
}

async function saveProduct(){
if(!isAdmin()) return alert("Somente admin");

const data={
name:pn.value,
price:Number(pp.value),
desc:pd.value,
colors:pc.value.split(","),
img:pimg.value
};

if(editId){
await updateDoc(doc(db,"products",editId),data);
editId=null;
}else{
await addDoc(collection(db,"products"),data);
}
loadProducts();
renderAdmin();
}

async function renderAdminProducts(){
const snap=await getDocs(collection(db,"products"));
adminProducts.innerHTML="";
snap.forEach(d=>{
adminProducts.innerHTML+=`
<div class="card">
<b>${d.data().name}</b>
<br><button onclick="editProduct('${d.id}')">Editar</button>
<button onclick="deleteProduct('${d.id}')">Excluir</button>
</div>`;
});
}

window.editProduct=function(id){
const p=products.find(x=>x.id===id);
pn.value=p.name;
pp.value=p.price;
pd.value=p.desc;
pc.value=(p.colors||[]).join(",");
pimg.value=p.img||"";
editId=id;
window.scrollTo(0,0);
}

window.deleteProduct=async function(id){
if(!confirm("Excluir produto?")) return;
await deleteDoc(doc(db,"products",id));
loadProducts();
renderAdmin();
}

/* ---------------- INIT ---------------- */
updateAdminBtn();
loadProducts();
updateCartCount();
showHome();

</script>
</body>
</html>
