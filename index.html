<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ffe600;padding:15px;display:flex;justify-content:space-between}
.logo{font-weight:bold;font-size:22px}
.container{padding:20px}

.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px}
.card{background:white;padding:10px;border-radius:8px;text-align:center;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}

.price{font-weight:bold}

.cartBtn{
position:fixed;bottom:20px;right:20px;
background:#3483fa;color:white;
padding:12px;border-radius:50px;cursor:pointer
}

.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;align-items:center
}

.modal-content{
background:white;padding:20px;border-radius:8px;width:300px;text-align:center
}

button{padding:8px;margin-top:5px;cursor:pointer}
</style>
</head>

<body>

<header>
<div class="logo">Pétrea Shop</div>
<div onclick="openCart()" style="cursor:pointer">🛒 Carrinho</div>
</header>

<div class="container">
<div class="products" id="products"></div>
</div>

<div class="cartBtn" onclick="openCart()">🛒</div>

<!-- Modal Produto -->
<div class="modal" id="productModal">
<div class="modal-content">
<img id="modalImg" style="width:100%;height:180px;object-fit:cover">
<h3 id="modalName"></h3>
<p id="modalPrice"></p>

<label>Cor:</label>
<select id="color">
<option>Branco</option>
<option>Preto</option>
<option>Vermelho</option>
</select>

<button onclick="addToCart()">Adicionar ao carrinho</button>
<button onclick="closeModal()">Fechar</button>
</div>
</div>

<!-- Modal Carrinho -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h3>Seu carrinho</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Finalizar compra</button>
<button onclick="closeCart()">Fechar</button>
</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products")||"[]");
let cart=JSON.parse(localStorage.getItem("cart")||"[]");
let selectedProduct=null;

function renderProducts(){
const container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${i})">
<img src="${p.image}">
<div>${p.name}</div>
<div class="price">R$ ${p.price}</div>
</div>`;
});
}

function openProduct(index){
selectedProduct=products[index];
document.getElementById("modalImg").src=selectedProduct.image;
document.getElementById("modalName").innerText=selectedProduct.name;
document.getElementById("modalPrice").innerText="R$ "+selectedProduct.price;
document.getElementById("productModal").style.display="flex";
}

function closeModal(){document.getElementById("productModal").style.display="none"}

function addToCart(){
const color=document.getElementById("color").value;
cart.push({...selectedProduct,color});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Produto adicionado!");
closeModal();
}

function openCart(){
const container=document.getElementById("cartItems");
container.innerHTML="";
cart.forEach(item=>{
container.innerHTML+=`<div>${item.name} - ${item.color} - R$ ${item.price}</div>`;
});
document.getElementById("cartModal").style.display="flex";
}

function closeCart(){document.getElementById("cartModal").style.display="none"}

function checkout(){
let text="Pedido:%0A";
cart.forEach(p=>{
text+=`• ${p.name} (${p.color}) - R$ ${p.price}%0A`;
});
window.open("https://wa.me/5534984449588?text="+text);
}

renderProducts();
</script>

</body>
</html>
