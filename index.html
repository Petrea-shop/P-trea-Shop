<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#ffe600;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

button{
  cursor:pointer;
}

.container{
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:8px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.price{
  font-weight:bold;
  margin:5px 0;
}

.admin-panel{
  display:none;
  background:white;
  padding:15px;
  margin:20px;
  border-radius:8px;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.cart{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#3483fa;
  color:white;
  padding:12px;
  border-radius:50px;
}
</style>
</head>

<body>

<header>
<div class="logo">Pétrea Shop</div>
<div>
<button onclick="adminLogin()">Admin</button>
</div>
</header>

<div class="container">
<div class="products" id="products"></div>
</div>

<div class="admin-panel" id="adminPanel">
<h3>Cadastrar Produto</h3>
<input id="name" placeholder="Nome do produto">
<input id="price" placeholder="Preço">
<input id="image" placeholder="URL da imagem">
<button onclick="addProduct()">Salvar Produto</button>
</div>

<div class="cart" onclick="checkout()">🛒 Finalizar</div>

<script>
const ADMIN_PASSWORD = "Petrea2024";

let products = JSON.parse(localStorage.getItem("products") || "[]");

function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div>${p.name}</div>
        <div class="price">R$ ${p.price}</div>
      </div>
    `;
  });
}

function adminLogin(){
  const pass = prompt("Petrea2024.");
  if(pass === ADMIN_PASSWORD){ ("Petrea2024")
    document.getElementById("adminPanel").style.display="block";
  }else{
    alert("Senha incorreta");
  }
}

function addProduct(){
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;

  if(!name || !price || !image){
    alert("Preencha todos os campos");
    return;
  }

  products.push({name,price,image});
  localStorage.setItem("products",JSON.stringify(products));
  renderProducts();

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("image").value="";
}

function checkout(){
  let text = "Olá, quero comprar:%0A";
  products.forEach(p=>{
    text += `• ${p.name} - R$ ${p.price}%0A`;
  });

  window.open("https://wa.me/5534984449588?text="+text);
}

renderProducts();
</script>

</body>
</html>
