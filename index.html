<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ffe600;padding:15px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:bold;font-size:22px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;padding:20px}
.card{background:white;padding:10px;border-radius:8px;text-align:center;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center}
.modal-content{background:white;padding:20px;border-radius:8px;width:320px;text-align:center}
.cartBtn{position:fixed;bottom:20px;right:20px;background:#3483fa;color:white;padding:12px;border-radius:50px;cursor:pointer}
button{padding:8px;margin-top:5px;cursor:pointer}
input,select{width:100%;padding:8px;margin:5px 0}
</style>
</head>

<body>

<header>
<div class="logo" id="storeName">Pétrea Shop</div>
<div>
<button onclick="openLogin()">Entrar</button>
<button id="adminBtn" style="display:none" onclick="openAdmin()">⚙️ Painel</button>
<button onclick="logout()">Sair</button>
</div>
</header>

<div id="products" class="products"></div>
<div class="cartBtn" onclick="openCart()">🛒</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="closeModal('loginModal')">Voltar</button>
</div>
</div>

<!-- PRODUTO -->
<div class="modal" id="productModal">
<div class="modal-content">
<img id="pImg" style="width:100%;height:180px;object-fit:cover">
<h3 id="pName"></h3>
<p id="pPrice"></p>
<button onclick="closeModal('productModal')">Voltar</button>
</div>
</div>

<!-- CARRINHO -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h3>Carrinho</h3>
<div id="cartItems"></div>
<button onclick="closeModal('cartModal')">Voltar</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="modal-content">
<h3>Painel Admin</h3>

<h4>Configurações da loja</h4>
<input id="newName" placeholder="Nome da loja">
<input id="logoUrl" placeholder="URL do logo">

<h4>Novo produto</h4>
<input id="name" placeholder="Nome">
<input id="price" placeholder="Preço">
<input id="image" placeholder="Imagem URL">

<button onclick="saveSettings()">Salvar configurações</button>
<button onclick="addProduct()">Adicionar produto</button>

<h4>Produtos cadastrados</h4>
<div id="productList"></div>

<button onclick="closeModal('adminModal')">Voltar</button>
</div>
</div>

<script>
const ADMIN_USER="admin";
const ADMIN_PASS="Petrea2024";

let settings=JSON.parse(localStorage.getItem("settings")||'{"name":"Pétrea Shop"}');
let products=JSON.parse(localStorage.getItem("products")||"[]");
let currentUser=localStorage.getItem("currentUser");

document.getElementById("storeName").innerText=settings.name;

function renderProducts(){
const container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${i})">
<img src="${p.image}">
<div>${p.name}</div>
<div>R$ ${p.price}</div>
</div>`;
});
}

function openProduct(i){
const p=products[i];
document.getElementById("pImg").src=p.image;
document.getElementById("pName").innerText=p.name;
document.getElementById("pPrice").innerText="R$ "+p.price;
document.getElementById("productModal").style.display="flex";
}

function openCart(){document.getElementById("cartModal").style.display="flex"}

function openLogin(){document.getElementById("loginModal").style.display="flex"}

function openAdmin(){
document.getElementById("adminModal").style.display="flex";
renderProductList();
}

function closeModal(id){document.getElementById(id).style.display="none"}

function login(){
const u=document.getElementById("loginUser").value;
const p=document.getElementById("loginPass").value;

if(u===ADMIN_USER && p===ADMIN_PASS){
currentUser="admin";
localStorage.setItem("currentUser","admin");
document.getElementById("adminBtn").style.display="inline";
closeModal('loginModal');
}else{
alert("Login inválido");
}
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

function saveSettings(){
settings.name=document.getElementById("newName").value||settings.name;
localStorage.setItem("settings",JSON.stringify(settings));
location.reload();
}

function addProduct(){
products.push({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value
});
localStorage.setItem("products",JSON.stringify(products));
renderProductList();
renderProducts();
}

function renderProductList(){
const list=document.getElementById("productList");
list.innerHTML="";
products.forEach((p,i)=>{
list.innerHTML+=`
<div>
${p.name} - R$ ${p.price}
<button onclick="editProduct(${i})">Editar</button>
<button onclick="deleteProduct(${i})">Excluir</button>
</div>`;
});
}

function editProduct(i){
const name=prompt("Novo nome",products[i].name);
const price=prompt("Novo preço",products[i].price);
const image=prompt("Nova imagem",products[i].image);
products[i]={name,price,image};
localStorage.setItem("products",JSON.stringify(products));
renderProductList();
renderProducts();
}

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderProductList();
renderProducts();
}

if(currentUser==="admin"){
document.getElementById("adminBtn").style.display="inline";
}

renderProducts();
</script>

</body>
</html>
