<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
button{padding:10px;margin:5px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer}
input,select{padding:8px;margin:5px;width:100%;max-width:300px}
.card{background:#fff;padding:10px;border-radius:8px;margin:10px 0}
img{max-width:100%;border-radius:6px}
.hidden{display:none}
.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.qty{width:60px}
</style>
</head>

<body>

<header id="headerBar">
<h2 id="storeName">Pétrea Shop</h2>
<p id="storeDesc">Calças, shorts, camisas, blusas e mais</p>
</header>

<div class="container">

<div class="topbar">
<button onclick="showHome()">🏠 Início</button>
<button onclick="showCart()">🛒 Carrinho</button>
<button onclick="showLogin()">👤 Conta</button>
<button id="adminBtn" class="hidden" onclick="showAdmin()">⚙️ Admin</button>
</div>

<div id="home"></div>
<div id="productView" class="hidden"></div>
<div id="cart" class="hidden"></div>
<div id="login" class="hidden"></div>
<div id="admin" class="hidden"></div>

</div>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc,
  doc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔴 COLE SEU CONFIG AQUI
const firebaseConfig = {
  // COLE AQUI
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ================= ELEMENTOS =================
const homeDiv = document.getElementById("home");
const productViewDiv = document.getElementById("productView");
const cartDiv = document.getElementById("cart");
const loginDiv = document.getElementById("login");
const adminDiv = document.getElementById("admin");
const adminBtn = document.getElementById("adminBtn");

// ================= ESTADO =================
let products = [];
let user = null;
let cartItems = [];

// ================= NAV =================
window.hideAll = function () {
  homeDiv.classList.add("hidden");
  productViewDiv.classList.add("hidden");
  cartDiv.classList.add("hidden");
  loginDiv.classList.add("hidden");
  adminDiv.classList.add("hidden");
};

window.showHome = async function () {
  hideAll();
  homeDiv.classList.remove("hidden");
  await renderProducts();
};

window.showCart = async function () {
  hideAll();
  cartDiv.classList.remove("hidden");
  renderCart();
};

window.showLogin = function () {
  hideAll();
  loginDiv.classList.remove("hidden");

  loginDiv.innerHTML = `
    <h3>Login</h3>
    <input id="email" placeholder="Usuário ou Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="loginUser()">Entrar</button>
    <button onclick="registerUser()">Criar conta</button>
  `;
};

window.showAdmin = function () {
  if (!isAdmin()) {
    alert("Apenas admin");
    return;
  }
  hideAll();
  adminDiv.classList.remove("hidden");
  renderAdmin();
};

// ================= AUTH =================
onAuthStateChanged(auth, async (u) => {
  user = u;
  updateAdminBtn();
  await loadCart();
  showHome();
});

function isAdmin() {
  return user && user.email === "admin@petrea.com";
}

function updateAdminBtn() {
  if (isAdmin()) adminBtn.classList.remove("hidden");
  else adminBtn.classList.add("hidden");
}

// ================= LOGIN =================
window.loginUser = async function () {
  let loginInput = document.getElementById("email").value.trim().toLowerCase();
  const senhaVal = document.getElementById("senha").value;

  if (loginInput === "admin") {
    loginInput = "admin@petrea.com";
  }

  await signInWithEmailAndPassword(auth, loginInput, senhaVal);
};

window.registerUser = async function () {
  let loginInput = document.getElementById("email").value.trim().toLowerCase();
  const senhaVal = document.getElementById("senha").value;

  if (loginInput === "admin") {
    alert("Usuário admin é reservado");
    return;
  }

  if (!loginInput.includes("@")) {
    loginInput = loginInput + "@cliente.com";
  }

  await createUserWithEmailAndPassword(auth, loginInput, senhaVal);
};

// ================= PRODUTOS =================
async function loadProducts() {
  const snap = await getDocs(collection(db, "products"));
  products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function renderProducts() {
  await loadProducts();
  homeDiv.innerHTML = "";

  if (products.length === 0) {
    homeDiv.innerHTML = "<p>Nenhum produto cadastrado.</p>";
    return;
  }

  products.forEach((p, i) => {
    homeDiv.innerHTML += `
      <div class="card">
        <img src="${p.img || ''}">
        <h3>${p.name}</h3>
        <p>R$ ${p.price}</p>
        <button onclick="openProduct(${i})">Ver produto</button>
      </div>
    `;
  });
}

window.openProduct = function (i) {
  const p = products[i];

  productViewDiv.innerHTML = `
    <button onclick="showHome()">⬅ Voltar</button>
    <div class="card">
      <img src="${p.img || ''}">
      <h2>${p.name}</h2>
      <p>${p.desc}</p>
      <p>R$ ${p.price}</p>

      <label>Cor</label>
      <select id="color">
        ${(p.colors || ["única"]).map(c => `<option>${c}</option>`).join("")}
      </select>

      <label>Quantidade</label>
      <input type="number" id="qty" value="1" min="1">

      <button onclick="addCart('${p.id}')">Adicionar ao carrinho</button>
    </div>
  `;

  hideAll();
  productViewDiv.classList.remove("hidden");
};

// ================= CARRINHO NUVEM =================
async function loadCart() {
  if (!user) {
    cartItems = [];
    return;
  }

  const ref = doc(db, "carts", user.uid);
  const snap = await getDoc(ref);
  cartItems = snap.exists() ? snap.data().items : [];
}

async function saveCart() {
  if (!user) return;
  await setDoc(doc(db, "carts", user.uid), { items: cartItems });
}

window.addCart = async function (id) {
  if (!user) {
    alert("Faça login");
    return;
  }

  const p = products.find(x => x.id === id);

  cartItems.push({
    name: p.name,
    price: p.price,
    color: document.getElementById("color").value,
    qty: Number(document.getElementById("qty").value)
  });

  await saveCart();
  alert("Adicionado ao carrinho!");
};

function renderCart() {
  cartDiv.innerHTML = `<button onclick="showHome()">⬅ Voltar</button>`;

  let total = 0;

  cartItems.forEach((c) => {
    total += c.price * c.qty;
    cartDiv.innerHTML += `
      <div class="card">
        <b>${c.name}</b><br>
        Cor: ${c.color}<br>
        Qtd: ${c.qty}<br>
        Total: R$ ${c.price * c.qty}
      </div>
    `;
  });

  cartDiv.innerHTML += `<h3>Total: R$ ${total}</h3>`;
}

// ================= ADMIN =================
window.renderAdmin = function () {
  adminDiv.innerHTML = `
    <button onclick="showHome()">⬅ Voltar</button>
    <h3>Painel Admin</h3>

    <input id="pn" placeholder="Nome">
    <input id="pp" placeholder="Preço">
    <input id="pd" placeholder="Descrição">
    <input id="pc" placeholder="Cores">
    <input id="pi" placeholder="URL da imagem">
    <button onclick="addProduct()">Adicionar</button>

    <div id="adminProducts"></div>
  `;

  renderAdminProducts();
};

window.addProduct = async function () {
  await addDoc(collection(db, "products"), {
    name: pn.value,
    price: Number(pp.value),
    desc: pd.value,
    colors: pc.value.split(","),
    img: pi.value
  });

  alert("Produto adicionado!");
  renderAdminProducts();
  renderProducts();
};

async function renderAdminProducts() {
  const snap = await getDocs(collection(db, "products"));
  adminProducts.innerHTML = "";

  snap.forEach(d => {
    adminProducts.innerHTML += `
      <div class="card">
        ${d.data().name}
        <button onclick="deleteProduct('${d.id}')">Excluir</button>
      </div>
    `;
  });
}

window.deleteProduct = async function (id) {
  await deleteDoc(doc(db, "products", id));
  renderAdminProducts();
  renderProducts();
};

</script>

</body>
</html>
