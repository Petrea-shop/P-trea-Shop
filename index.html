<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
button{padding:10px;margin:5px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer}
input,select{padding:8px;margin:5px;width:100%;max-width:300px}
.card{background:#fff;padding:10px;border-radius:8px;margin:10px 0}
img{max-width:100%;border-radius:6px}
.hidden{display:none}
.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.qty{width:60px}
</style>
</head>

<body>

<header>
<h2 id="storeName">Pétrea Shop</h2>
<p id="storeDesc">Calças, shorts, camisas, blusas e mais</p>
</header>

<div class="container">

<div class="topbar">
<button onclick="showHome()">🏠 Início</button>
<button onclick="showCart()">🛒 Carrinho</button>
<button onclick="showLogin()">👤 Conta</button>
<button id="adminBtn" class="hidden" onclick="showAdmin()">⚙️ Admin</button>
</div>

<div id="home"></div>
<div id="productView" class="hidden"></div>
<div id="cart" class="hidden"></div>
<div id="login" class="hidden"></div>
<div id="admin" class="hidden"></div>

</div>

<script>
// -------- DADOS --------
let products=JSON.parse(localStorage.getItem("products")||"[]")
let user=JSON.parse(localStorage.getItem("user")||"null")

const ADMIN_USER="admin"
const ADMIN_PASS="Petrea2024"

// carrinho agora é por usuário
function getCart(){
if(!user) return []
return JSON.parse(localStorage.getItem("cart_"+user.name)||"[]")
}
function saveCart(cart){
if(!user) return
localStorage.setItem("cart_"+user.name,JSON.stringify(cart))
}

// -------- PERMISSÃO --------
function isAdmin(){ return user && user.admin===true }

// -------- NAV --------
function hideAll(){
home.classList.add("hidden")
productView.classList.add("hidden")
cartDiv.classList.add("hidden")
login.classList.add("hidden")
admin.classList.add("hidden")
}

function showHome(){ hideAll(); home.classList.remove("hidden"); renderProducts() }
function showCart(){ hideAll(); cartDiv.classList.remove("hidden"); renderCart() }
function showLogin(){ hideAll(); login.classList.remove("hidden") }

function showAdmin(){
if(!isAdmin()){ alert("Acesso apenas admin"); return }
hideAll(); admin.classList.remove("hidden"); renderAdmin()
}

// -------- PRODUTOS --------
function renderProducts(){
home.innerHTML=""
products.forEach((p,i)=>{
home.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="openProduct(${i})">Ver produto</button>
</div>`
})
}

function openProduct(i){
const p=products[i]
productView.innerHTML=`
<button onclick="showHome()">⬅ Voltar</button>
<div class="card">
<img src="${p.img}">
<h2>${p.name}</h2>
<p>${p.desc}</p>
<p>R$ ${p.price}</p>

<label>Cor</label>
<select id="color">${p.colors.map(c=>`<option>${c}</option>`).join("")}</select>

<label>Quantidade</label>
<input type="number" id="qty" value="1" min="1">

<button onclick="addCart(${i})">Adicionar ao carrinho</button>
</div>`
hideAll()
productView.classList.remove("hidden")
}

function addCart(i){
if(!user){ alert("Faça login"); return }
let cart=getCart()
const p=products[i]
cart.push({name:p.name,price:p.price,color:color.value,qty:Number(qty.value)})
saveCart(cart)
alert("Adicionado")
}

// -------- CARRINHO --------
const cartDiv=document.getElementById("cart")

function renderCart(){
let cart=getCart()
cartDiv.innerHTML=`<button onclick="showHome()">⬅ Voltar</button>`
let total=0

cart.forEach((c,i)=>{
total+=c.price*c.qty
cartDiv.innerHTML+=`
<div class="card">
<b>${c.name}</b><br>
Cor: ${c.color}<br>
Qtd: <input class="qty" type="number" value="${c.qty}" min="1" onchange="updateQty(${i},this.value)">
<br>Total: R$ ${c.price*c.qty}
<br><button onclick="removeItem(${i})">Remover</button>
</div>`
})

cartDiv.innerHTML+=`
<h3>Total: R$ ${total}</h3>
<button onclick="clearCart()">🗑 Limpar carrinho</button>
<button onclick="checkout()">Finalizar no WhatsApp</button>`
}

function updateQty(i,val){
let cart=getCart()
cart[i].qty=Number(val)
saveCart(cart)
renderCart()
}

function removeItem(i){
let cart=getCart()
cart.splice(i,1)
saveCart(cart)
renderCart()
}

function clearCart(){
saveCart([])
renderCart()
}

function checkout(){
let cart=getCart()
let msg="Pedido:%0A"
cart.forEach(c=> msg+=`${c.name} ${c.color} x${c.qty}%0A`)
window.open(`https://wa.me/5534984449588?text=${msg}`)
}

// -------- LOGIN --------
login.innerHTML=`
<h3>Login</h3>
<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="doLogin()">Entrar</button>
`

function doLogin(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){
user={admin:true,name:"admin"}
}else{
user={admin:false,name:u.value}
}
localStorage.setItem("user",JSON.stringify(user))
updateAdminBtn()
showHome()
}

function updateAdminBtn(){
if(isAdmin()) adminBtn.classList.remove("hidden")
else adminBtn.classList.add("hidden")
}

// -------- ADMIN --------
function renderAdmin(){
admin.innerHTML=`
<button onclick="showHome()">⬅ Voltar</button>
<h3>Painel Admin</h3>

<input id="pn" placeholder="Nome">
<input id="pp" placeholder="Preço">
<input id="pd" placeholder="Descrição">
<input id="pc" placeholder="Cores ex: branco,preto">
<input type="file" id="imgFile">
<button onclick="addProduct()">Adicionar</button>

<div id="adminProducts"></div>
`
renderAdminProducts()
}

function addProduct(){
if(!isAdmin()){ alert("Somente admin"); return }
const file=imgFile.files[0]
const reader=new FileReader()
reader.onload=e=>{
products.push({name:pn.value,price:Number(pp.value),desc:pd.value,colors:pc.value.split(","),img:e.target.result})
localStorage.setItem("products",JSON.stringify(products))
renderAdminProducts()
renderProducts()
}
reader.readAsDataURL(file)
}

function renderAdminProducts(){
adminProducts.innerHTML=""
products.forEach((p,i)=>{
adminProducts.innerHTML+=`
<div class="card">${p.name}
<button onclick="deleteProduct(${i})">Excluir</button>
</div>`
})
}

function deleteProduct(i){
if(!isAdmin()) return
products.splice(i,1)
localStorage.setItem("products",JSON.stringify(products))
renderAdminProducts()
renderProducts()
}

// -------- INIT --------
updateAdminBtn()
showHome()
</script>

</body>
</html>
