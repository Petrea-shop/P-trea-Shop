<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja Online</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: var(--cor-loja, #2c7be5); color: #fff; padding: 15px; text-align: center; }
    nav { display: flex; justify-content: center; gap: 15px; background: #222; padding: 10px; }
    nav button { color: #fff; background: none; border: none; cursor: pointer; font-size: 16px; }
    .container { padding: 20px; }
    .produto { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    .admin { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    input, button { padding: 8px; margin: 5px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1 id="nomeLoja">Minha Loja</h1>
  </header>

  <nav>
    <button onclick="mostrarPagina('inicio')">Início</button>
    <button onclick="mostrarPagina('carrinho')">Carrinho</button>
    <button onclick="mostrarPagina('conta')">Conta</button>
  </nav>

  <div class="container">

    <!-- LOGIN ADMIN -->
    <div id="loginAdmin" class="admin">
      <h3>Login Admin</h3>
      <input id="adminUser" placeholder="Usuário" />
      <input id="adminPass" type="password" placeholder="Senha" />
      <button onclick="loginAdmin()">Entrar</button>
    </div>

    <!-- PAINEL ADMIN -->
    <div id="painelAdmin" class="admin hidden">
      <h3>Painel do Admin</h3>

      <label>Nome da Loja</label><br />
      <input id="novoNome" placeholder="Novo nome" />
      <button onclick="salvarNome()">Salvar Nome</button><br />

      <label>Cor da Loja</label><br />
      <input id="novaCor" type="color" />
      <button onclick="salvarCor()">Salvar Cor</button><br />

      <hr />
      <h4>Adicionar Produto</h4>
      <input id="prodNome" placeholder="Nome do produto" />
      <input id="prodPreco" placeholder="Preço" />
      <button onclick="adicionarProduto()">Adicionar</button>
    </div>

    <!-- PÁGINAS -->
    <div id="paginaInicio">
      <h2>Produtos</h2>
      <div id="listaProdutos"></div>
    </div>

    <div id="paginaCarrinho" class="hidden">
      <h2>Carrinho</h2>
      <div id="listaCarrinho"></div>
    </div>

    <div id="paginaConta" class="hidden">
      <h2>Minha Conta</h2>
      <p>Área do usuário.</p>
    </div>

  </div>

<script>
  // 🔥 CONFIGURE COM SEU FIREBASE
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_DOMINIO",
    projectId: "SEU_PROJECT_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // =========================
  // NAVEGAÇÃO
  // =========================
  function mostrarPagina(pagina) {
    document.getElementById('paginaInicio').classList.add('hidden');
    document.getElementById('paginaCarrinho').classList.add('hidden');
    document.getElementById('paginaConta').classList.add('hidden');

    if (pagina === 'inicio') document.getElementById('paginaInicio').classList.remove('hidden');
    if (pagina === 'carrinho') document.getElementById('paginaCarrinho').classList.remove('hidden');
    if (pagina === 'conta') document.getElementById('paginaConta').classList.remove('hidden');
  }

  // =========================
  // LOGIN ADMIN
  // =========================
  function loginAdmin() {
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;

    if (user === 'admin' && pass === 'Petrea2024') {
      document.getElementById('painelAdmin').classList.remove('hidden');
      document.getElementById('loginAdmin').classList.add('hidden');
    } else {
      alert('Login inválido');
    }
  }

  // =========================
  // CONFIG LOJA (GLOBAL)
  // =========================
  function salvarNome() {
    const nome = document.getElementById('novoNome').value;
    db.collection('config').doc('loja').set({ nome }, { merge: true });
  }

  function salvarCor() {
    const cor = document.getElementById('novaCor').value;
    db.collection('config').doc('loja').set({ cor }, { merge: true });
  }

  db.collection('config').doc('loja').onSnapshot(doc => {
    const data = doc.data();
    if (!data) return;

    if (data.nome) document.getElementById('nomeLoja').innerText = data.nome;
    if (data.cor) document.documentElement.style.setProperty('--cor-loja', data.cor);
  });

  // =========================
  // PRODUTOS
  // =========================
  function adicionarProduto() {
    const nome = document.getElementById('prodNome').value;
    const preco = document.getElementById('prodPreco').value;

    if (!nome || !preco) {
      alert('Preencha nome e preço');
      return;
    }

    db.collection('produtos').add({ nome, preco });

    document.getElementById('prodNome').value = '';
    document.getElementById('prodPreco').value = '';
  }

  const carrinho = [];

  db.collection('produtos').onSnapshot(snapshot => {
    const lista = document.getElementById('listaProdutos');
    lista.innerHTML = '';

    snapshot.forEach(doc => {
      const p = doc.data();

      const div = document.createElement('div');
      div.className = 'produto';
      div.innerHTML = `
        <strong>${p.nome}</strong><br>
        R$ ${p.preco}<br>
        <button onclick="addCarrinho('${p.nome}','${p.preco}')">Adicionar ao carrinho</button>
      `;
      lista.appendChild(div);
    });
  });

  function addCarrinho(nome, preco) {
    carrinho.push({ nome, preco });
    renderCarrinho();
    alert('Produto adicionado ao carrinho');
  }

  function renderCarrinho() {
    const lista = document.getElementById('listaCarrinho');
    lista.innerHTML = '';

    carrinho.forEach(item => {
      const div = document.createElement('div');
      div.className = 'produto';
      div.innerHTML = `${item.nome} - R$ ${item.preco}`;
      lista.appendChild(div);
    });
  }
</script>
</body>
</html>
