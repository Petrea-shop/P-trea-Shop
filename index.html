<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétrea Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
button{padding:10px;margin:5px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer}
input,select,textarea{padding:8px;margin:5px;width:100%;max-width:300px}
.card{background:#fff;padding:10px;border-radius:8px;margin:10px 0}
img{max-width:100%;border-radius:6px}
.hidden{display:none}
.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.qty{width:60px}
.pasteBox{border:2px dashed #999;padding:15px;margin:10px 0;text-align:center;background:#fafafa}
</style>
</head>

<body>

<header>
<h2 id="storeName">Pétrea Shop</h2>
<p id="storeDesc">Calças, shorts, camisas, blusas e mais</p>
</header>

<div class="container">

<div class="topbar">
<button onclick="showHome()">🏠 Início</button>
<button onclick="showCart()">🛒 Carrinho</button>
<button onclick="showLogin()">👤 Conta</button>
<button id="adminBtn" class="hidden" onclick="showAdmin()">⚙️ Admin</button>
</div>

<div id="home"></div>
<div id="productView" class="hidden"></div>
<div id="cart" class="hidden"></div>
<div id="login" class="hidden"></div>
<div id="admin" class="hidden"></div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔴 COLE AQUI SUAS CHAVES DO FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_MSG_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// -------- DADOS --------
let products=[];
let user=JSON.parse(localStorage.getItem("user")||"null");
let currentImage="";

const ADMIN_USER="admin";
const ADMIN_PASS="Petrea2024";

// -------- NAV --------
function hideAll(){
home.classList.add("hidden");
productView.classList.add("hidden");
cart.classList.add("hidden");
login.classList.add("hidden");
admin.classList.add("hidden");
}

window.showHome=function(){ hideAll(); home.classList.remove("hidden"); renderProducts(); }
window.showCart=function(){ hideAll(); cart.classList.remove("hidden"); renderCart(); }
window.showLogin=function(){ hideAll(); login.classList.remove("hidden"); }

window.showAdmin=function(){
if(!isAdmin()){ alert("Acesso apenas admin"); return }
hideAll(); admin.classList.remove("hidden"); renderAdmin();
}

function isAdmin(){ return user && user.admin===true }

function updateAdminBtn(){
if(isAdmin()) adminBtn.classList.remove("hidden")
else adminBtn.classList.add("hidden")
}

// -------- PRODUTOS FIREBASE --------
async function loadProducts(){
const snap=await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=> products.push({id:d.id,...d.data()}));
renderProducts();
}

function renderProducts(){
home.innerHTML="";
products.forEach((p,i)=>{
home.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="openProduct(${i})">Ver produto</button>
</div>`;
});
}

window.openProduct=function(i){
const p=products[i];
productView.innerHTML=`
<button onclick="showHome()">⬅ Voltar</button>
<div class="card">
<img src="${p.img}">
<h2>${p.name}</h2>
<p>${p.desc}</p>
<p>R$ ${p.price}</p>
<label>Quantidade</label>
<input type="number" id="qty" value="1" min="1">
<button onclick="addCart(${i})">Adicionar ao carrinho</button>
</div>`;
hideAll();
productView.classList.remove("hidden");
}

// -------- CARRINHO GLOBAL --------
function getCart(){
if(!user) return [];
return JSON.parse(localStorage.getItem("cart_"+user.name)||"[]");
}
function saveCart(c){
if(!user) return;
localStorage.setItem("cart_"+user.name,JSON.stringify(c));
}

window.addCart=function(i){
if(!user){ alert("Faça login"); return }
let cartData=getCart();
const p=products[i];
cartData.push({name:p.name,price:p.price,qty:Number(qty.value)});
saveCart(cartData);
alert("Adicionado");
}

function renderCart(){
let cartData=getCart();
cart.innerHTML=`<button onclick="showHome()">⬅ Voltar</button>`;
let total=0;
cartData.forEach((c,i)=>{
total+=c.price*c.qty;
cart.innerHTML+=`
<div class="card">
<b>${c.name}</b><br>
Qtd: ${c.qty}<br>
Total: R$ ${c.price*c.qty}
</div>`;
});
cart.innerHTML+=`<h3>Total: R$ ${total}</h3>`;
}

// -------- LOGIN --------
login.innerHTML=`
<h3>Login</h3>
<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="doLogin()">Entrar</button>
`;

window.doLogin=function(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){
user={admin:true,name:"admin"};
}else{
user={admin:false,name:u.value};
}
localStorage.setItem("user",JSON.stringify(user));
updateAdminBtn();
showHome();
}

// -------- ADMIN --------
function renderAdmin(){
admin.innerHTML=`
<button onclick="showHome()">⬅ Voltar</button>
<h3>Painel Admin</h3>

<input id="pn" placeholder="Nome">
<input id="pp" placeholder="Preço">
<input id="pd" placeholder="Descrição">
<input id="pc" placeholder="Cores ex: branco,preto">

<div class="pasteBox" contenteditable="true" id="pasteArea">
📋 Cole a imagem aqui (Ctrl+V)
</div>

<img id="preview" style="max-width:150px;display:none;margin:10px 0">

<button onclick="addProduct()">Adicionar</button>

<div id="adminProducts"></div>
`;

// capturar colagem
setTimeout(()=>{
const box=document.getElementById("pasteArea");
box.onpaste=e=>{
const items=e.clipboardData.items;
for(let item of items){
if(item.type.indexOf("image")!==-1){
const file=item.getAsFile();
const reader=new FileReader();
reader.onload=ev=>{
currentImage=ev.target.result;
preview.src=currentImage;
preview.style.display="block";
};
reader.readAsDataURL(file);
}
}
};
},200);

renderAdminProducts();
}

window.addProduct=async function(){
if(!isAdmin()){ alert("Somente admin"); return }
if(!currentImage){ alert("Cole uma imagem primeiro"); return }

await addDoc(collection(db,"products"),{
name:pn.value,
price:Number(pp.value),
desc:pd.value,
colors:pc.value.split(","),
img:currentImage
});

currentImage="";
loadProducts();
renderAdmin();
}

async function renderAdminProducts(){
const snap=await getDocs(collection(db,"products"));
adminProducts.innerHTML="";
snap.forEach(d=>{
adminProducts.innerHTML+=`<div class="card">${d.data().name}</div>`;
});
}

// -------- INIT --------
updateAdminBtn();
loadProducts();
showHome();

</script>
</body>
</html>
